common:
  location_tz: Europe/Amsterdam
  connector_type: KukaAMR
  connector_version: "0.1.0"

  env_vars:
    INORBIT_API_KEY: "${INORBIT_API_KEY}"

  # KUKA.AMR Fleet Interface Manager (separate from Fleet Manager UI)
  fleet_url: "http://192.168.1.100:5000"
  username: "${KUKA_INTERFACE_USERNAME}"
  password: "${KUKA_INTERFACE_PASSWORD}"

  # Map image on KUKA fileserver (no auth)
  map_image_path: "/my_facility_floor_0/my_facility_floor_0.png"
  map_resolution: 0.05

kuka-1:
  robot_name: "KUKA KMP 600P #1"
  kuka_robot_id: "1"

kuka-2:
  robot_name: "KUKA KMP 600P #2"
  kuka_robot_id: "2"

